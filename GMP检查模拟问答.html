<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMP检查模拟 · I-125密封籽源 (50题随机10题)</title>
    <style>
        /* ===== 全局重置 & 基础 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', Roboto, 'Helvetica Neue', sans-serif;
            background: #f0f4f9;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            max-width: 860px;
            width: 100%;
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 20px 50px rgba(26, 58, 92, 0.18);
            overflow: hidden;
            transition: box-shadow 0.3s;
        }

        /* ===== 头部 ===== */
        .header {
            background: linear-gradient(135deg, #1a3a5c 0%, #1f4a72 100%);
            padding: 24px 30px 18px;
            color: #fff;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .header-title .badge {
            background: rgba(255, 255, 255, 0.18);
            border-radius: 40px;
            padding: 2px 14px;
            font-size: 12px;
            font-weight: 400;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .header-stats {
            font-size: 14px;
            background: rgba(255, 255, 255, 0.10);
            padding: 6px 16px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .progress-wrap {
            margin-top: 14px;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .progress-bar {
            flex: 1;
            height: 6px;
            background: rgba(255, 255, 255, 0.20);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-bar .fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #f5d98f, #c9a96e);
            border-radius: 10px;
            transition: width 0.5s ease;
        }

        .progress-label {
            font-size: 13px;
            font-weight: 500;
            min-width: 48px;
            text-align: right;
            opacity: 0.85;
        }

        /* ===== 主体 ===== */
        .main {
            padding: 26px 30px 18px;
        }

        /* ===== 问题区域 ===== */
        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 4px;
        }

        .q-number {
            font-size: 14px;
            font-weight: 600;
            color: #1a3a5c;
            background: #eaf0f8;
            padding: 4px 16px;
            border-radius: 30px;
            letter-spacing: 0.3px;
        }

        .q-tag {
            font-size: 13px;
            color: #7a8fa6;
            background: #f0f4f9;
            padding: 4px 14px;
            border-radius: 30px;
        }

        .q-title {
            font-size: 19px;
            font-weight: 600;
            color: #0b2a44;
            margin: 8px 0 4px;
            letter-spacing: 0.2px;
        }

        .q-text {
            background: #f7faff;
            border-left: 4px solid #c9a96e;
            padding: 16px 20px;
            border-radius: 12px;
            margin: 10px 0 18px;
            font-size: 16px;
            line-height: 1.7;
            color: #1e3a5a;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.02);
        }

        .q-text::before {
            content: "🔍 ";
            font-size: 18px;
        }

        /* ===== 回答区 ===== */
        .answer-area {
            margin: 4px 0 14px;
        }

        .answer-area label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #2c4a6a;
            margin-bottom: 6px;
        }

        .answer-area textarea {
            width: 100%;
            min-height: 90px;
            padding: 12px 16px;
            border: 1.5px solid #dce4ed;
            border-radius: 14px;
            font-size: 15px;
            font-family: inherit;
            line-height: 1.6;
            color: #1a2e44;
            background: #fafcff;
            transition: border-color 0.25s, box-shadow 0.25s;
            resize: vertical;
        }

        .answer-area textarea:focus {
            outline: none;
            border-color: #1a3a5c;
            box-shadow: 0 0 0 4px rgba(26, 58, 92, 0.08);
        }

        .answer-area textarea::placeholder {
            color: #a0b4c9;
            font-weight: 300;
        }

        /* ===== 按钮组 ===== */
        .action-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 6px 0 14px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 9px 22px;
            border: none;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s ease;
            background: #eef3f9;
            color: #1f3f5c;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.06);
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-primary {
            background: #1a3a5c;
            color: #fff;
        }
        .btn-primary:hover {
            background: #0f2d4a;
            box-shadow: 0 6px 20px rgba(26, 58, 92, 0.25);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-gold {
            background: #c9a96e;
            color: #fff;
        }
        .btn-gold:hover {
            background: #b89556;
            box-shadow: 0 6px 20px rgba(201, 169, 110, 0.35);
        }

        .btn-outline {
            background: transparent;
            border: 1.5px solid #d0dbe8;
            color: #2c4a6a;
        }
        .btn-outline:hover {
            border-color: #1a3a5c;
            background: #f5f9ff;
        }

        .btn-sm {
            padding: 6px 14px;
            font-size: 13px;
        }

        .btn-success {
            background: #2a7a5a;
            color: #fff;
        }
        .btn-success:hover {
            background: #1e6347;
            box-shadow: 0 6px 20px rgba(42, 122, 90, 0.3);
        }

        .btn-icon {
            font-size: 18px;
            line-height: 1;
        }

        /* ===== 解析区 ===== */
        .explanation {
            margin-top: 6px;
            border-top: 2px dashed #e4ecf5;
            padding-top: 18px;
            display: none;
            animation: fadeSlide 0.4s ease;
        }

        .explanation.open {
            display: block;
        }

        @keyframes fadeSlide {
            0% {
                opacity: 0;
                transform: translateY(10px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .explanation .exp-title {
            font-size: 16px;
            font-weight: 600;
            color: #1a3a5c;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .explanation .exp-title span {
            background: #eaf0f8;
            padding: 0 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 400;
            color: #3a5a7a;
        }

        .exp-block {
            background: #f8faff;
            border-radius: 14px;
            padding: 16px 20px;
            margin-bottom: 12px;
            border-left: 4px solid #1a3a5c;
        }

        .exp-block.gold {
            border-left-color: #c9a96e;
            background: #fdfbf7;
        }

        .exp-block strong {
            display: block;
            font-size: 14px;
            color: #1a3a5c;
            margin-bottom: 4px;
        }

        .exp-block p {
            font-size: 15px;
            line-height: 1.7;
            color: #23415e;
            margin: 0;
        }

        .exp-block ul {
            margin: 6px 0 0 20px;
            font-size: 15px;
            line-height: 1.7;
            color: #23415e;
        }

        .exp-block ul li {
            margin-bottom: 4px;
        }

        /* ===== 评分结果 ===== */
        .score-area {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 2px solid #eaf0f8;
            display: none;
        }
        .score-area.open {
            display: block;
        }

        .score-summary {
            background: #f2f8ff;
            border-radius: 16px;
            padding: 18px 22px;
            text-align: center;
            margin-bottom: 14px;
        }
        .score-summary .big-score {
            font-size: 48px;
            font-weight: 700;
            color: #1a3a5c;
            line-height: 1.2;
        }
        .score-summary .big-score span {
            font-size: 24px;
            color: #7a8fa6;
        }
        .score-summary .label {
            font-size: 16px;
            color: #2c4a6a;
            margin-top: 4px;
        }

        .score-detail {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px 16px;
            max-height: 200px;
            overflow-y: auto;
            padding-right: 4px;
        }
        .score-item {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            padding: 4px 8px;
            background: #fafcff;
            border-radius: 8px;
            border-left: 3px solid #c9d6e4;
        }
        .score-item .qid {
            color: #2c4a6a;
        }
        .score-item .qscore {
            font-weight: 600;
            color: #1a3a5c;
        }
        .score-item .qscore.pass {
            color: #2a7a5a;
        }
        .score-item .qscore.fail {
            color: #b34a4a;
        }

        /* ===== 底部导航 ===== */
        .footer-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 14px;
            margin-top: 10px;
            padding-top: 16px;
            border-top: 1px solid #ebf0f6;
        }

        .dots {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .dot {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid #dce4ed;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            color: #889eb6;
            cursor: pointer;
            transition: all 0.2s;
        }

        .dot:hover {
            border-color: #1a3a5c;
            color: #1a3a5c;
        }

        .dot.active {
            border-color: #1a3a5c;
            background: #1a3a5c;
            color: #fff;
        }

        .dot.done {
            border-color: #c9a96e;
            background: #c9a96e;
            color: #fff;
        }
        .dot.done::after {
            content: "✓";
            font-size: 14px;
        }
        .dot.done span {
            display: none;
        }

        .dot.scored {
            border-color: #2a7a5a;
            background: #2a7a5a;
            color: #fff;
        }
        .dot.scored::after {
            content: "★";
            font-size: 14px;
        }
        .dot.scored span {
            display: none;
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .btn-submit-score {
            background: #2a7a5a;
            color: #fff;
            padding: 9px 28px;
            border-radius: 40px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            font-size: 15px;
            transition: 0.2s;
        }
        .btn-submit-score:hover {
            background: #1e6347;
            box-shadow: 0 6px 20px rgba(42, 122, 90, 0.3);
        }
        .btn-submit-score:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 600px) {
            .game-container {
                border-radius: 18px;
            }
            .header {
                padding: 18px 16px 14px;
            }
            .header-title {
                font-size: 17px;
                gap: 6px;
            }
            .main {
                padding: 16px 16px 14px;
            }
            .q-title {
                font-size: 17px;
            }
            .q-text {
                font-size: 15px;
                padding: 12px 14px;
            }
            .action-bar {
                gap: 6px;
            }
            .btn {
                padding: 7px 14px;
                font-size: 14px;
            }
            .footer-nav {
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
            }
            .nav-buttons {
                justify-content: center;
                flex-wrap: wrap;
            }
            .dots {
                justify-content: center;
            }
            .dot {
                width: 28px;
                height: 28px;
                font-size: 11px;
            }
            .exp-block {
                padding: 12px 14px;
            }
            .score-detail {
                grid-template-columns: 1fr;
                max-height: 150px;
            }
            .score-summary .big-score {
                font-size: 36px;
            }
        }

        @media (max-width: 400px) {
            .header-title {
                font-size: 15px;
            }
            .header-stats {
                font-size: 12px;
                padding: 4px 10px;
            }
            .q-number {
                font-size: 12px;
                padding: 2px 10px;
            }
            .btn {
                font-size: 13px;
                padding: 6px 12px;
            }
        }

        /* ===== 工具类 ===== */
        .hidden {
            display: none !important;
        }
        .text-center {
            text-align: center;
        }
        .mt-8 {
            margin-top: 8px;
        }
        .flex {
            display: flex;
        }
        .flex-center {
            align-items: center;
        }
        .gap-4 {
            gap: 4px;
        }
        .w-full {
            width: 100%;
        }

        /* ===== 滚动条美化 ===== */
        textarea::-webkit-scrollbar,
        .score-detail::-webkit-scrollbar {
            width: 6px;
        }
        textarea::-webkit-scrollbar-track,
        .score-detail::-webkit-scrollbar-track {
            background: #f0f4f9;
            border-radius: 10px;
        }
        textarea::-webkit-scrollbar-thumb,
        .score-detail::-webkit-scrollbar-thumb {
            background: #c9d6e4;
            border-radius: 10px;
        }
        textarea::-webkit-scrollbar-thumb:hover {
            background: #a0b4c9;
        }

        /* ===== 完成动画 ===== */
        .celebrate {
            text-align: center;
            padding: 8px 0 2px;
        }
        .celebrate .big {
            font-size: 40px;
            margin-bottom: 4px;
        }
        .celebrate h3 {
            color: #1a3a5c;
            font-weight: 600;
            font-size: 20px;
        }
        .celebrate p {
            color: #4a6a8a;
            font-size: 15px;
        }
    </style>
</head>
<body>

    <div class="game-container" id="app">
        <!-- ===== 头部 ===== -->
        <header class="header">
            <div class="header-top">
                <div class="header-title">
                    <span>🏥</span> GMP 检查模拟
                    <span class="badge">I-125 密封籽源</span>
                </div>
                <div class="header-stats" id="statsDisplay">
                    <span id="answeredCount">0</span> / <span id="totalCount">10</span> 已回答
                </div>
            </div>
            <div class="progress-wrap">
                <div class="progress-bar">
                    <div class="fill" id="progressFill" style="width: 0%;"></div>
                </div>
                <div class="progress-label" id="progressLabel">0%</div>
            </div>
        </header>

        <!-- ===== 主体 ===== -->
        <main class="main">

            <!-- 问题卡片 -->
            <div id="questionCard">
                <div class="question-header">
                    <span class="q-number" id="qNumber">问题 1/10</span>
                    <span class="q-tag" id="qTag">辐射防护</span>
                </div>
                <h2 class="q-title" id="qTitle">辐射防护措施</h2>
                <div class="q-text" id="qText">
                    检查老师提问内容加载中...
                </div>

                <div class="answer-area">
                    <label for="answerInput">📝 你的回答：</label>
                    <textarea id="answerInput" placeholder="请在此输入你的回答，然后点击「查看解析」对照学习…"></textarea>
                </div>

                <div class="action-bar">
                    <button class="btn btn-gold" id="btnExplain">📖 查看解析</button>
                    <button class="btn btn-outline btn-sm" id="btnClear">清空回答</button>
                    <span style="flex:1; min-width:20px;"></span>
                    <button class="btn btn-outline btn-sm" id="btnPrev" disabled>◀ 上一题</button>
                    <button class="btn btn-primary btn-sm" id="btnNext">下一题 ▶</button>
                </div>

                <!-- 解析区 -->
                <div class="explanation" id="explanation">
                    <div class="exp-title">
                        📋 专业解析
                        <span>GMP 检查视角</span>
                    </div>
                    <div class="exp-block" id="expInterpret">
                        <strong>🔹 专业解释</strong>
                        <p>解析内容加载中...</p>
                    </div>
                    <div class="exp-block gold" id="expAdvice">
                        <strong>💡 建议</strong>
                        <p>建议内容加载中...</p>
                    </div>
                </div>

                <!-- 评分结果区域 -->
                <div class="score-area" id="scoreArea">
                    <div class="score-summary" id="scoreSummary">
                        <div class="big-score" id="totalScoreDisplay">0 <span>/ 100</span></div>
                        <div class="label" id="scoreLabel">请完成全部回答后提交评分</div>
                    </div>
                    <div class="score-detail" id="scoreDetail"></div>
                </div>
            </div>

            <!-- 完成状态（隐藏） -->
            <div id="completeState" class="hidden">
                <div class="celebrate">
                    <div class="big">🎉</div>
                    <h3>全部问题已完成！</h3>
                    <p>你已作答全部 10 道随机题目。<br>点击「提交评分」查看你的成绩。</p>
                    <div style="margin-top:16px; display:flex; gap:12px; justify-content:center; flex-wrap:wrap;">
                        <button class="btn btn-success" id="btnSubmitScore">📊 提交评分</button>
                        <button class="btn btn-outline" id="btnRestart">🔄 重新抽题</button>
                    </div>
                </div>
            </div>

            <!-- ===== 底部导航 ===== -->
            <div class="footer-nav">
                <div class="dots" id="dotContainer">
                    <!-- 由 JavaScript 生成 -->
                </div>
                <div class="nav-buttons">
                    <button class="btn btn-outline btn-sm" id="btnPrevFooter" disabled>◀ 上一题</button>
                    <button class="btn btn-primary btn-sm" id="btnNextFooter">下一题 ▶</button>
                    <button class="btn-submit-score" id="btnSubmitScoreFooter">📊 提交评分</button>
                </div>
            </div>

        </main>
    </div>

    <script>
        // ============================================================
        //  题库：50 个 GMP 检查情景提问 (I-125 密封籽源)
        // ============================================================
        const fullQuestionBank = [{
            id: 1,
            tag: '辐射防护',
            title: '辐射防护措施',
            question: '请详细说明 I-125 密封籽源生产车间内，针对操作人员的外照射和内照射防护，具体采取了哪些措施？包括屏蔽设施、个人防护用品、工作流程设计等方面。',
            explanation: '外照射防护遵循「时间、距离、屏蔽」三原则：①缩短操作时间，优化工作流程；②使用长柄工具增加距离；③配备铅屏蔽容器、铅砖等。内照射防护重在防止摄入或吸入，包括在负压通风橱或手套箱内操作，佩戴高效过滤口罩，穿戴防护服、双层手套，严格执行个人剂量监测（TLD或电子剂量计），工作场所定期进行表面污染和空气采样检测。',
            advice: '①定期对屏蔽设施进行完整性检查，铅罐、铅砖不得有裂缝或变形；②所有操作人员必须经过辐射防护专项培训并考核合格；③建立个人剂量档案，剂量异常时及时调查并采取改进措施；④工作场所应分区管理，严格区分控制区、监督区和非限制区。',
            keywords: ['屏蔽', '距离', '时间', '防护服', '手套', '剂量监测', '通风橱']
        }, {
            id: 2,
            tag: '环境监测',

                [arr[i], arr[j]] = [arr[j], arr[i]];

        function scoreAnswer(answer, keywords) {
            if (!answer || answer.trim().length === 0) return 0;
            const lower = answer.toLowerCase();
            let found = 0;
            for (let kw of keywords) {
                if (lower.includes(kw.toLowerCase())) {
                    found++;
                }
            }
            const ratio = found / keywords.length;
            if (ratio >= 0.6) return 10;
            if (ratio >= 0.4) return 7;
            if (ratio >= 0.2) return 4;
            return 1; // 有回答但关键词太少，给1分以示鼓励

            dotContainer.innerHTML = '';
            for (let i = 0; i < state.pool.length; i++) {
                const dot = document.createElement('div');
                dot.className = 'dot';
                if (i === state.current) dot.classList.add('active');
                if (state.answers[i] && state.answers[i].trim().length > 0) dot.classList.add('done');
                if (state.scored) {
                    dot.classList.remove('done', 'active');
                    dot.classList.add('scored');
                }
                const span = document.createElement('span');
                span.textContent = i + 1;
                dot.appendChild(span);
                dot.dataset.index = i;
                dot.addEventListener('click', () => goTo(i));
                dotContainer.appendChild(dot);
            }

        function updateProgress() {
            const answered = state.answers.filter(a => a && a.trim().length > 0).length;
            const pct = Math.round((answered / state.pool.length) * 100);

        function clearAnswer() {
            if (state.scored) return;
            answerInput.value = '';
            state.answers[state.current] = '';
            updateProgress();
            updateStats();
            renderDots();
        }

        // 提交评分
        function submitScore() {
            // 检查是否所有题目都有回答（非空）
            const allAnswered = state.answers.every(a => a && a.trim().length > 0);
            if (!allAnswered) {
                alert('请先完成所有10道题的回答再提交评分！');
                return;
            }

            // 计算每道题的得分
            let details = [];
            let total = 0;
            for (let i = 0; i < state.pool.length; i++) {
                const q = state.pool[i];
                const ans = state.answers[i] || '';
                const score = scoreAnswer(ans, q.keywords);
                details.push({ index: i, score: score, max: 10 });
                total += score;
            }
            state.scoreDetails = details;
            state.totalScore = total;
            state.scored = true;

            // 显示评分区域
            scoreArea.classList.add('open');
            totalScoreDisplay.innerHTML = `${total} <span>/ 100</span>`;
            if (total >= 80) scoreLabel.textContent = '✅ 优秀！你对GMP和辐射防护理解深入。';
            else if (total >= 60) scoreLabel.textContent = '📘 良好，部分要点可加强，建议复习解析。';
            else scoreLabel.textContent = '📖 需要加强学习，仔细对照解析查漏补缺。';

            // 显示每题得分
            scoreDetail.innerHTML = '';
            details.forEach(d => {
                const item = document.createElement('div');
                item.className = 'score-item';
                const qid = document.createElement('span');
                qid.className = 'qid';
                qid.textContent = `第 ${d.index+1} 题`;
                const qscore = document.createElement('span');
                qscore.className = 'qscore ' + (d.score >= 7 ? 'pass' : 'fail');
                qscore.textContent = `${d.score} / 10`;
                item.appendChild(qid);
                item.appendChild(qscore);
                scoreDetail.appendChild(item);
            });

            // 更新导航按钮状态
            btnSubmitScore.disabled = true;
            btnSubmitScoreFooter.disabled = true;
            btnSubmitScoreFooter.textContent = '✅ 已评分';

            // 更新所有小圆点为已评分样式
            renderDots();
            // 隐藏完成状态
            completeState.classList.add('hidden');
            questionCard.classList.remove('hidden');

            // 跳转到第一题（显示评分）
            state.current = 0;
            loadQuestion(0);
            updateProgress();
            updateStats();
        }

        // 重新抽题
        function restart() {
            // 重置状态
            state.pool = selectRandomQuestions();
            state.current = 0;
            state.answers = new Array(state.pool.length).fill('');
            state.explained = new Array(state.pool.length).fill(false);
            state.scored = false;
            state.scoreDetails = [];
            state.totalScore = 0;

            questionCard.classList.remove('hidden');
            completeState.classList.add('hidden');
            scoreArea.classList.remove('open');
            btnSubmitScore.disabled = false;
            btnSubmitScoreFooter.disabled = false;
            btnSubmitScoreFooter.textContent = '📊 提交评分';

            // 重置显示
            loadQuestion(0);
            updateProgress();
            updateStats();
            renderDots();
            explanation.classList.remove('open');
        }

        // 检查是否全部回答完毕，显示完成状态（但保留评分功能）
        function checkComplete() {
            const allAnswered = state.answers.every(a => a && a.trim().length > 0);
            if (allAnswered && !state.scored) {
                // 显示完成提示（可以在底部显示一条消息，但我们有导航栏的提交评分按钮）
                // 此处不额外处理，由用户点击提交评分
            }
        }

        // ============================================================
        //  事件绑定
        // ============================================================

        // 输入时自动保存
        answerInput.addEventListener('input', function() {
            if (state.scored) return;
            state.answers[state.current] = this.value;
            updateProgress();
            updateStats();
            renderDots();
            // 检查是否全部回答
            checkComplete();
        });

        btnExplain.addEventListener('click', showExplanation);

        btnClear.addEventListener('click', clearAnswer);

        btnPrev.addEventListener('click', prevQuestion);
        btnNext.addEventListener('click', nextQuestion);
        btnPrevFooter.addEventListener('click', prevQuestion);
        btnNextFooter.addEventListener('click', nextQuestion);

        btnSubmitScore.addEventListener('click', submitScore);
        btnSubmitScoreFooter.addEventListener('click', submitScore);

        btnRestart.addEventListener('click', restart);

        // 键盘快捷键
        document.addEventListener('keydown', (e) => {
            if (state.scored) return;
            if (e.target.tagName === 'TEXTAREA') {
                if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                    e.preventDefault();
                    showExplanation();
                }
                return;
            }
            if (e.key === 'ArrowLeft' && state.current > 0) {
                e.preventDefault();
                prevQuestion();
            } else if (e.key === 'ArrowRight' && state.current < state.pool.length - 1) {
                e.preventDefault();
                nextQuestion();
            }
        });

        // ============================================================
        //  初始化
        // ============================================================

        function init() {
            state.pool = selectRandomQuestions();
            state.answers = new Array(state.pool.length).fill('');
            state.explained = new Array(state.pool.length).fill(false);
            state.scored = false;
            totalCount.textContent = state.pool.length;
            loadQuestion(0);
            updateProgress();
            updateStats();
            renderDots();
            // 隐藏评分区
            scoreArea.classList.remove('open');
            console.log('💡 快捷键: Ctrl+Enter 查看解析 | ← → 切换题目');
        }

        init();
    </script>

</body>
</html>
